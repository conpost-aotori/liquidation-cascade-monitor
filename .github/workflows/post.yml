name: post-liquidation-map

# 12-hourly: 19:00 / 07:00 JST  (= UTC 10:00 / 22:00).
# GitHub cron is UTC and may be delayed a few minutes under load.
on:
  schedule:
    - cron: "0 10,22 * * *"
  workflow_dispatch:
    inputs:
      post:
        description: "Post to X? (false = dry-run: render only, no tweet)"
        type: boolean
        default: false

concurrency:
  group: post-liquidation-map
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Japanese fonts (render fallback)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Crawl + render (+ post on schedule)
        env:
          PYTHONUTF8: "1"
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.post }}" = "true" ]; then
            echo "::notice::LIVE run — will post to X"
            python scripts/generate.py --source live --max-addresses 0 --post-x
          else
            echo "::notice::DRY-RUN — render only, no posting"
            python scripts/generate.py --source live --max-addresses 0
          fi

      - name: Upload rendered image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: liqmap-${{ github.run_id }}
          path: out/liqmap_btc_live.png
          if-no-files-found: warn
