name: post-liquidation-map

# Normal cadence: 12-hourly at 10:00 / 22:00 UTC (= 19:00 / 07:00 JST).
# TEMPORARY (special exception): the schedule also fires every 3h. The "gate" step
# below only lets the EXTRA slots post while now < SPECIAL_WINDOW_END; after that it
# auto-reverts to the 12h slots (10/22 UTC) only. GitHub cron is UTC and may be
# delayed/occasionally skipped under load.
on:
  schedule:
    - cron: "0 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch:
    inputs:
      post:
        description: "Post to X? (false = dry-run: render only, no tweet)"
        type: boolean
        default: false

concurrency:
  group: post-liquidation-map
  cancel-in-progress: false

env:
  # End of the temporary 3-hourly window (UTC). After this only 10/22 UTC post.
  SPECIAL_WINDOW_END: "2026-06-02 15:00:00 UTC"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Schedule gate (3-hourly only during the special window)
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          HOUR=$(date -u +%H)
          NOW=$(date -u +%s)
          END=$(date -u -d "${SPECIAL_WINDOW_END}" +%s)
          if [ "$HOUR" = "10" ] || [ "$HOUR" = "22" ] || [ "$NOW" -lt "$END" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Posting slot (hour=$HOUR UTC)."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Outside 3-hourly window and not a 12h slot (hour=$HOUR) — skipping."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Japanese fonts (render fallback)
        if: steps.gate.outputs.run == 'true'
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Crawl + render (+ post on schedule)
        if: steps.gate.outputs.run == 'true'
        env:
          PYTHONUTF8: "1"
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.post }}" = "true" ]; then
            echo "::notice::LIVE run — will post to X"
            python scripts/generate.py --source live --max-addresses 0 --llm --post-x
          else
            echo "::notice::DRY-RUN — render only, no posting"
            python scripts/generate.py --source live --max-addresses 0 --llm
          fi

      - name: Upload rendered image
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: liqmap-${{ github.run_id }}
          path: out/liqmap_btc_live.png
          if-no-files-found: warn
