name: post-liquidation-map

# Runs HOURLY, but a cheap gate decides whether to actually post. This makes the
# cadence resilient to GitHub's skipped/delayed scheduled runs: if a slot's exact
# trigger is skipped, a later hourly run catches up. State (was this slot already
# posted?) is read from the X timeline itself, so there are no duplicates either.
#   - Normal cadence: 12-hourly slots at 10:00 / 22:00 UTC (= 19:00 / 07:00 JST)
#   - During SPECIAL_WINDOW: 3-hourly slots at 1,4,7,10,13,16,19,22 UTC
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "auto = slot gate (like schedule); force = post now; dry = render only"
        type: choice
        options: [auto, force, dry]
        default: auto

concurrency:
  group: post-liquidation-map
  cancel-in-progress: false

env:
  SPECIAL_WINDOW_END: "2026-06-03 12:00:00 UTC" # 3-hourly until here, then 12-hourly
  X_USER_ID: "2052021032933093377" # @Nishi8mAlert

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Slot gate (catch-up + dedupe via X timeline)
        id: gate
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
        run: |
          EV="${{ github.event_name }}"
          MODE="${{ inputs.mode }}"
          if [ "$EV" = "workflow_dispatch" ] && [ "$MODE" = "force" ]; then
            echo "run=true"  >> "$GITHUB_OUTPUT"; echo "live=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Manual force post."; exit 0
          fi
          if [ "$EV" = "workflow_dispatch" ] && [ "$MODE" = "dry" ]; then
            echo "run=true"  >> "$GITHUB_OUTPUT"; echo "live=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual dry-run (render only)."; exit 0
          fi

          NOW=$(date -u +%s)
          END=$(date -u -d "$SPECIAL_WINDOW_END" +%s)
          if [ "$NOW" -lt "$END" ]; then SLOTS="1 4 7 10 13 16 19 22"; else SLOTS="10 22"; fi
          HOUR=$(date -u +%H | sed 's/^0//'); [ -z "$HOUR" ] && HOUR=0

          # Most recent slot boundary <= now (search today + yesterday).
          TODAY=$(date -u +%F); YEST=$(date -u -d 'yesterday' +%F); SLOT=0
          for H in $SLOTS; do for D in "$TODAY" "$YEST"; do
            TS=$(date -u -d "$D ${H}:00:00 UTC" +%s)
            if [ "$TS" -le "$NOW" ] && [ "$TS" -gt "$SLOT" ]; then SLOT=$TS; fi
          done; done
          echo "Slots: [$SLOTS]  current slot start: $(date -u -d @$SLOT)"

          # Read last liquidation-map post time from the timeline (state store).
          BEARER=$(curl -s -u "$X_API_KEY:$X_API_SECRET" -d grant_type=client_credentials \
            https://api.twitter.com/oauth2/token | jq -r '.access_token // empty')
          if [ -z "$BEARER" ]; then
            echo "::warning::Bearer fetch failed; falling back to exact-slot trigger."
            for H in $SLOTS; do [ "$H" = "$HOUR" ] && { echo "run=true">>"$GITHUB_OUTPUT"; echo "live=true">>"$GITHUB_OUTPUT"; exit 0; }; done
            echo "run=false">>"$GITHUB_OUTPUT"; echo "live=false">>"$GITHUB_OUTPUT"; exit 0
          fi
          LAST=$(curl -s -H "Authorization: Bearer $BEARER" \
            "https://api.twitter.com/2/users/${X_USER_ID}/tweets?max_results=100&tweet.fields=created_at" \
            | jq -r '[.data[]? | select((.text|contains("清算予兆")) or (.text|contains("清算カスケード"))) | .created_at] | max // "1970-01-01T00:00:00Z"')
          LAST_TS=$(date -u -d "$LAST" +%s 2>/dev/null || echo 0)
          echo "Last liquidation-map post: $LAST"

          if [ "$LAST_TS" -lt "$SLOT" ]; then
            echo "run=true"  >> "$GITHUB_OUTPUT"; echo "live=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No post yet for this slot -> POST (catch-up safe)."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"; echo "live=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Slot already covered -> skip."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Japanese fonts (render fallback)
        if: steps.gate.outputs.run == 'true'
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Crawl + render (+ post unless dry)
        if: steps.gate.outputs.run == 'true'
        env:
          PYTHONUTF8: "1"
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          EXTRA=""
          if [ "${{ steps.gate.outputs.live }}" = "true" ]; then EXTRA="--post-x"; echo "::notice::LIVE post"; else echo "::notice::DRY-RUN (no post)"; fi
          python scripts/generate.py --source live --max-addresses 0 --llm $EXTRA

      - name: Upload rendered image
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: liqmap-${{ github.run_id }}
          path: out/liqmap_btc_live.png
          if-no-files-found: warn
